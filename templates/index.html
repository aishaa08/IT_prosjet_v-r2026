<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <script src="{{url_for('static', filename='script.js')}}"></script>
</head>
<body>

    <h1>Server Monitor</h1>
    <a href="/ansatte">Se ansatte</a>
    <table border="1">
        <tr>

            <th>ID</th>
            <th>CPU %</th>
            <th>RAM %</th>
            <th>Tidspunkt</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table> 
    
    <div id="vis">
        <button onclick="vis()">navn</button>
    </div>
</body>
</html>
